run_name: mwm_real_tf_pretrain
ckp: cdit_xl_100000
#from_checkpoint: models/checkpoints/nwm/cdit_xl_100000.pth.tar

# training setup
results_dir: logs
train: True
batch_size: 12
eval_batch_size: 46
num_workers: 12
model: CDiT-XL/2
lr: 6e-5

# normalization for the action space
normalize: True
grad_clip_val: 10.0
context_size: 4

# distance bounds for distance and action and distance predictions 
distance:
  min_dist_cat: -64
  max_dist_cat: 64

# action output params
len_traj_pred: 20

# dataset specific parameters
image_size: 224
datasets:
  real_beike:
    data_folder: data/real_beike
    train: data_splits/real_beike/train
    test: data_splits/real_beike/test
    goals_per_obs: 4

