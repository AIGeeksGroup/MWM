run_name: nwm_cdit_xl_lora

# training setup
results_dir: logs
train: True
batch_size: 2
eval_batch_size: 100
num_workers: 12
model: CDiT-XL/2
lr: 2e-4
#lr: 0

# normalization for the action space
normalize: True
grad_clip_val: 10.0
context_size: 4

# distance bounds for distance and action and distance predictions 
distance:
  min_dist_cat: -64
  max_dist_cat: 64

# action output params
len_traj_pred: 20

# dataset specific parameters
image_size: 224
datasets:
  lixiang_3dgs_traj:
    data_folder: data_input/lixiang_3dgs_traj
    train: data_splits/lixiang_3dgs_traj/train/ # path to train folder with traj_names.txt
    test: data_splits/lixiang_3dgs_traj/test/ # path to test folder with traj_names.txt
    goals_per_obs: 4

