run_name: mwm
ckp: cdit_xl_100000

# training setup
results_dir: logs
train: True
batch_size: 2
eval_batch_size: 100
num_workers: 12
model: CDiT-XL/2
lr: 2e-4

# normalization for the action space
normalize: True
grad_clip_val: 10.0
context_size: 4

# distance bounds for distance and action and distance predictions 
distance:
  min_dist_cat: -64
  max_dist_cat: 64

# action output params
len_traj_pred: 64

# dataset specific parameters
image_size: 224
datasets:
  scand:
    data_folder: data/scand
    train: data_splits/scand/train
    test: data_splits/scand/test
    goals_per_obs: 4
  go_stanford:
    data_folder: data/go_stanford
    test: data_splits/go_stanford/test
    goals_per_obs: 4

